<div class="modal fade auth-modal" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-body">
                    <div class="row">

                        <!-- ĐĂNG NHẬP -->
                        <div class="col-md-6 auth-divider">
                            <h5 class="auth-title">ĐĂNG NHẬP</h5>

                            <div class="mb-3">
                                <label class="form-label">Tên tài khoản hoặc địa chỉ email *</label>
                                <input type="text" class="form-control">

                            <div class="mb-3">

                                <input type="password" class="form-control">

                            <div class="mb-3 form-check">

                        <div class="col-md-6 ps-md-4">

                                <input type="email" class="form-control">

                                A password will be sent to your email address.
                            </p>

                            <p class="form-note">
                                Tất cả thông tin của bạn chỉ được sử dụng cho việc đặt hàng và cải thiện trải nghiệm sản

                                Ngoài ra được đảm bảo về quyền riêng tư cá nhân theo quy định pháp luật.
                            </p>

                            <button class="btn btn-auth">ĐĂNG KÝ</button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
