<!-- auth-modal.html  –  ĐĂNG NHẬP / ĐĂNG KÝ modal cho AKKO Website -->
<div class="modal fade auth-modal" id="authModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body">
        <div class="row">

          <!-- ===== ĐĂNG NHẬP ===== -->
          <div class="col-md-6 auth-divider">
            <h5 class="auth-title">ĐĂNG NHẬP</h5>

            <div class="mb-3">
              <label class="form-label">Tên tài khoản hoặc địa chỉ email *</label>
              <input type="text" id="loginUser" class="form-control" placeholder="Email của bạn">
            </div>

            <div class="mb-3">
              <label class="form-label">Mật khẩu *</label>
              <input type="password" id="loginPass" class="form-control" placeholder="••••••">
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" id="rememberMe" class="form-check-input">
              <label class="form-check-label" for="rememberMe">Ghi nhớ mật khẩu</label>
            </div>

            <!-- Hiển thị lỗi đăng nhập -->
            <p id="loginError" style="color: #c0392b; font-size: 13px; min-height: 18px;"></p>

            <button id="loginBtn" class="btn btn-auth mb-3">ĐĂNG NHẬP</button>

            <div>
              <a href="#" style="text-decoration: none">Quên mật khẩu?</a>
            </div>
          </div>

          <!-- ===== ĐĂNG KÝ ===== -->
          <div class="col-md-6 ps-md-4">
            <h5 class="auth-title">ĐĂNG KÝ</h5>

            <div class="mb-3">
              <label class="form-label">Địa chỉ email *</label>
              <input type="email" id="registerEmail" class="form-control" placeholder="you@example.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Mật khẩu *</label>
              <input type="password" id="registerPass" class="form-control" placeholder="Tối thiểu 6 ký tự">
            </div>

            <!-- Hiển thị lỗi đăng ký -->
            <p id="registerError" style="color: #c0392b; font-size: 13px; min-height: 18px;"></p>

            <p class="form-note">
              Tất cả thông tin của bạn chỉ được sử dụng cho việc đặt hàng và cải thiện trải nghiệm sản phẩm.
              Ngoài ra được đảm bảo về quyền riêng tư cá nhân theo quy định pháp luật.
            </p>

            <button id="registerBtn" class="btn btn-auth">ĐĂNG KÝ</button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
